<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🌌 Космическая рулетка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #00ffff, #ff66ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: #8ba0c0;
            font-size: 12px;
            margin-bottom: 30px;
        }

        .slot-window {
            background: #03060e;
            border-radius: 40px;
            padding: 30px 20px;
            margin: 20px 0;
            border: 1px solid #00ffff33;
            box-shadow: inset 0 0 30px rgba(0,255,255,0.1);
        }

        .result-emoji {
            font-size: 70px;
            margin-bottom: 10px;
        }

        .result-name {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-code {
            font-family: monospace;
            background: #0a0f1a;
            padding: 10px 16px;
            border-radius: 40px;
            margin-top: 15px;
            display: inline-block;
            border: 1px dashed #ffd700;
            color: #ffd966;
            font-size: 16px;
        }

        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #992200;
            text-transform: uppercase;
            margin: 15px 0;
        }

        .spin-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #992200;
        }

        .spin-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .info {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 12px;
            font-size: 12px;
            color: #7e95b5;
        }

        .attempts {
            color: #00ffcc;
            font-weight: bold;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 0.4s ease-in-out;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌀 КОСМИЧЕСКАЯ РУЛЕТКА</h1>
    <div class="sub">Крути удачу — получай промокоды!</div>

    <div class="slot-window" id="slotWindow">
        <div class="result-emoji" id="resultEmoji">🌌</div>
        <div class="result-name" id="resultName">Готов?</div>
        <div><span class="result-code" id="resultCode">Нажми на кнопку</span></div>
    </div>

    <button class="spin-btn" id="spinBtn">🎲 КРУТИТЬ 🎲</button>

    <div class="info">
        ⭐ Сегодня попыток: <span id="attemptsLeft" class="attempts">3</span>/3<br>
        💫 Каждый день сбрасываются
    </div>
</div>

<script>
    // ========== ТВОИ ПРОМОКОДЫ (ДОБАВЛЯЙ СЮДА) ==========
    const PRIZES = [
        { emoji: "🎁", name: "ПРОМО", code: "0202022" },
        { emoji: "⭐", name: "ПРОМО", code: "0202022" },
        { emoji: "🚀", name: "ПРОМО", code: "0202022" },
        { emoji: "💎", name: "ПРОМО", code: "0202022" },
        { emoji: "🛸", name: "ПРОМО", code: "0202022" },
        { emoji: "🌕", name: "ПРОМО", code: "12345" },
        { emoji: "🔮", name: "ПРОМО", code: "020202" }
    ];
    // ====================================================

    let attemptsToday = 3;
    const STORAGE_KEY = "cosmic_roulette";

    function loadAttempts() {
        const saved = localStorage.getItem(STORAGE_KEY);
        const today = new Date().toDateString();
        if (saved) {
            const data = JSON.parse(saved);
            if (data.date === today) {
                attemptsToday = data.attempts;
            } else {
                attemptsToday = 3;
                saveAttempts();
            }
        } else {
            attemptsToday = 3;
            saveAttempts();
        }
        updateUI();
    }

    function saveAttempts() {
        const data = {
            date: new Date().toDateString(),
            attempts: attemptsToday
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateUI() {
        document.getElementById("attemptsLeft").innerText = attemptsToday;
        const btn = document.getElementById("spinBtn");
        btn.disabled = (attemptsToday <= 0);
    }

    function spin() {
        if (attemptsToday <= 0) {
            showResult("❌", "ЛИМИТ ПОПЫТОК", "Завтра повезёт больше!");
            return;
        }

        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        const windowDiv = document.getElementById("slotWindow");
        windowDiv.classList.add("spinning");

        setTimeout(() => {
            // Выбираем случайный приз ТОЛЬКО из PRIZES (без утешительных)
            const prize = PRIZES[Math.floor(Math.random() * PRIZES.length)];

            attemptsToday--;
            saveAttempts();
            updateUI();
            showResult(prize.emoji, prize.name, prize.code);
            windowDiv.classList.remove("spinning");
            btn.disabled = (attemptsToday <= 0);

            if (navigator.vibrate) navigator.vibrate(100);

            // Отправляем результат в Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({
                    prize: prize.name,
                    code: prize.code
                }));
            }
        }, 400);
    }

    function showResult(emoji, name, code) {
        document.getElementById("resultEmoji").innerHTML = emoji;
        document.getElementById("resultName").innerHTML = name;
        document.getElementById("resultCode").innerHTML = `🎟️ ${code} 🎟️`;
    }

    loadAttempts();
    document.getElementById("spinBtn").addEventListener("click", spin);

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
